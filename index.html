<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Nemati Vidioes & Nemati Movies</title>
<link rel="icon" type="image/png" href="ChatGPT Image Jun 2, 2026, 01_17_56 PM.png">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    color:white;
}

/* HEADER */

header{
    background:#000;
    border-bottom:2px solid #ff9900;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:15px 25px;
}

.logo img{
    width:220px;
}

/* SEARCH */

.search-box{
    width:45%;
}

.search-box input{
    width:100%;
    padding:12px 20px;
    border:none;
    border-radius:30px;
    background:#151515;
    color:white;
    font-size:16px;
    outline:none;
}

/* MENU */

.menu{
    display:flex;
    gap:20px;
}

.menu a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.menu a:hover{
    color:#ff9900;
}


    /* اینجا بعدا عکس خودت رو قرار بده */
    background-image:url("banner.jpg");

    background-size:cover;
    background-position:center;

    border-bottom:2px solid #111;
}

/* HOT SECTION */
.hot-title{
    display:flex;
    align-items:center;
    gap:10px;
    padding:20px 25px;
}

.hot-title h2{
    margin:0;
    line-height:1;
}

.flag{
    width:30px;
    height:30px;
    border-radius:50%;
    object-fit:cover;
    display:block;
}
.flag{
    transform:translateY(-2px);
}
/* VIDEOS */

.videos{
    padding:20px;

    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));

    gap:20px;
}

.card{
    background:#111;
    border-radius:15px;
    overflow:hidden;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    display:block;
}

.info{
    padding:15px;
}

.info h3{
    margin-bottom:10px;
}

.info p{
    color:#aaa;
}

/* FOOTER */

footer{
    margin-top:30px;
    padding:20px;
    text-align:center;
    background:#111;
}

</style>
</head>
<body>

<header>

    <div class="logo">
        <img src="ChatGPT Image Jun 2, 2026, 01_17_56 PM.png" alt="Nemat Hub">
    </div>

    <div class="search-box">
        <input type="text" placeholder="Search Nemat Hub...">
    </div>

    <nav class="menu">
        <a href="#">HOME</a>
        <a href="#">VIDEOS</a>
        <a href="#">COMMUNITY</a>
        <a href="#">PHOTOS</a>
    </nav>

</header>


<!-- Hot Nemat Videos -->

<div class="hot-title">

    <h2>Hot Nemat Videos In Iran</h2>

    <img
    class="flag"
    src="https://upload.wikimedia.org/wikipedia/commons/c/ca/Flag_of_Iran.svg"
    alt="Iran">

</div>

<!-- VIDEO CARDS -->

<div class="card">
    <img id="memeImage">
    <div class="info">
        <h3 id="memeTitle">Loading...</h3>
    </div>
</div>

<script>
fetch("https://meme-api.com/gimme")
.then(response => response.json())
.then(data => {
    document.getElementById("memeImage").src = data.url;
    document.getElementById("memeTitle").innerText = data.title;
});
</script>

<footer>
© 2026 Nemat Hub 
ساخته شده توسط فردی ناآشنا ولی آشنا...
</footer>

</body>
</html>
